<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'DM Mono', monospace; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
    padding-bottom: 8px;
  }
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .slider-row label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    display: flex;
    justify-content: space-between;
  }
  .slider-row label span { color: rgba(255,255,255,0.65); }
  input[type=range] {
    -webkit-appearance: none;
    width: 140px;
    height: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
    border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #7eb8f7;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div style="position:fixed;top:4px;left:4px;color:rgba(255,255,255,0.25);font-size:9px;font-family:monospace;pointer-events:none;">v18</div>
<audio id="silenceUnlock" src="silence.mp3" preload="auto"></audio>

<div id="audioStatus" style="position:fixed;bottom:8px;left:8px;color:rgba(255,255,0,0.8);font-family:monospace;font-size:11px;pointer-events:none;">Audio: not started</div>
<div id="joystickPad" style="
  position:fixed;
  bottom:24px;
  left:24px;
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid rgba(204,68,255,0.4);
  background:rgba(204,68,255,0.08);
  touch-action:none;
  display:flex;
  align-items:center;
  justify-content:center;
">
  <div id="joystickKnob" style="
    width:36px;
    height:36px;
    border-radius:50%;
    background:rgba(204,68,255,0.5);
    pointer-events:none;
    transition:transform 0.05s;
  "></div>
</div>
<div id="controls">
  <div class="slider-row">
    <label>SEPARATION <span id="ls">0.8</span></label>
    <input type="range" id="sep" min="0" max="4" step="0.1" value="0.8">
  </div>
  <div class="slider-row">
    <label>ALIGNMENT <span id="la">2.8</span></label>
    <input type="range" id="ali" min="0" max="4" step="0.1" value="2.8">
  </div>
  <div class="slider-row">
    <label>COHESION <span id="lc">1.2</span></label>
    <input type="range" id="coh" min="0" max="4" step="0.1" value="1.2">
  </div>
  <div class="slider-row">
    <label>RADIUS <span id="lr">120</span></label>
    <input type="range" id="rad" min="20" max="200" step="5" value="120">
  </div>
  <div class="slider-row">
    <label>SPEED <span id="lsp">2.5</span></label>
    <input type="range" id="spd" min="0.5" max="8" step="0.25" value="2.5">
  </div>
  <div class="slider-row">
    <label>VELOCITY NOISE <span id="lvn">0.04</span></label>
    <input type="range" id="vnoise" min="0" max="0.3" step="0.01" value="0.04">
  </div>
  <div class="slider-row">
    <label>INERTIA <span id="lin">0.75</span></label>
    <input type="range" id="inertia" min="0" max="0.98" step="0.01" value="0.75">
  </div>
  <div class="slider-row">
    <label>DENSITY <span id="lden">0.60</span></label>
    <input type="range" id="density" min="0" max="1" step="0.01" value="0.60">
  </div>
  <div class="slider-row">
    <label>BANKING <span id="lbnk">0.50</span></label>
    <input type="range" id="banking" min="0" max="1" step="0.01" value="0.50">
  </div>
  <div class="slider-row">
    <label>SMOOTHING <span id="lsmth">0.55</span></label>
    <input type="range" id="smoothing" min="0" max="0.97" step="0.01" value="0.55">
  </div>
  <div class="slider-row">
    <label>TURN RATE <span id="ltr">0.06</span></label>
    <input type="range" id="turnrate" min="0.01" max="0.30" step="0.01" value="0.06">
  </div>
  <div class="slider-row">
    <label>BOIDS <span id="lbc">60</span></label>
    <input type="range" id="boidcount" min="10" max="500" step="10" value="60">
  </div>
  <div class="slider-row">
    <label>INDIVIDUALITY <span id="lind">0</span>%</label>
    <input type="range" id="individuality" min="0" max="30" step="1" value="0">
  </div>
  <div class="slider-row">
    <button id="hawkBtn" style="
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.65);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      width: 140px;
    ">HAWK</button>
  </div>
  <div class="slider-row">
    <button id="muteBtn" style="
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.65);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      width: 140px;
    ">♪ SOUND ON</button>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('audioStatus');
  if (el) el.textContent = 'ERR L' + line + ': ' + (err ? err.message : msg);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('audioStatus');
  if (el) el.textContent = 'PROMISE: ' + (e.reason ? e.reason.message || e.reason : '?');
});

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Params
let params = {
  sep: 0.8,
  ali: 2.8,
  coh: 1.2,
  radius: 120,
  maxSpeed: 2.5,
  count: 60,
  spookRate: 0,
  velNoise: 0.04,
  inertia: 0.75,
  density: 0.60,
  banking: 0.50,
  smoothing: 0.55,
  turnRate: 0.06,
  individuality: 0  // % variation per trait per boid (0-5)
};

// Wire up sliders
function wire(id, key, labelId, uiId) {
  const el = document.getElementById(id);
  const lbl = document.getElementById(labelId);
  const ui = document.getElementById(uiId);
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    lbl.textContent = el.value;
    if (ui) ui.textContent = el.value;
  });
}
wire('sep','sep','ls',null);
wire('ali','ali','la',null);
wire('coh','coh','lc',null);
wire('rad','radius','lr',null);
wire('spd','maxSpeed','lsp',null);

wire('vnoise','velNoise','lvn',null);
wire('inertia','inertia','lin',null);
wire('density','density','lden',null);
wire('banking','banking','lbnk',null);
wire('smoothing','smoothing','lsmth',null);
wire('turnrate','turnRate','ltr',null);

// Individuality slider — custom wiring since label has % suffix
document.getElementById('individuality').addEventListener('input', function() {
  params.individuality = parseFloat(this.value);
  document.getElementById('lind').textContent = this.value;
  // Resample all existing boids' trait multipliers
  for (const b of flock) {
    b.tSep     = traitVariance();
    b.tAli     = traitVariance();
    b.tCoh     = traitVariance();
    b.tSpeed   = traitVariance();
    b.tTurn    = traitVariance();
    b.tInertia = traitVariance();
  }
});

function initBoidCountSlider() {
  document.getElementById('boidcount').addEventListener('input', function() {
    const n = parseInt(this.value);
    document.getElementById('lbc').textContent = n;
    while (flock.length < n) flock.push(new Boid());
    if (flock.length > n) flock.length = n;
  });
}

// Spook system
// spookRate 0 = disabled, 10 = very frequent (~every 60 frames)
// Maps rate 1-10 → interval 600-60 frames (exponential feel)
const SPOOK_DURATION = 8;
const SPOOK_FORCE = 7;
const SPOOK_CONTAGION_RADIUS = 90;
const SPOOK_CONTAGION_PROB = 0.25;

function spookInterval() {
  if (params.spookRate === 0) return Infinity;
  // rate 1→600f, rate 10→60f
  return Math.round(600 - (params.spookRate - 1) * (540 / 9));
}

let nextSpookIn = spookInterval();
let frameCount = 0;

// Returns a multiplier centered on 1.0, varying ±pct%
function traitVariance() {
  const pct = params.individuality / 100;
  return 1.0 + (Math.random() * 2 - 1) * pct;
}

// Boid class
class Boid {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const a = Math.random() * Math.PI * 2;
    this.vx = Math.cos(a) * params.maxSpeed;
    this.vy = Math.sin(a) * params.maxSpeed;
    this.color = '#7eb8f7';
    this.baseColor = this.color;
    this.size = 3.5 + Math.random() * 2;
    this.spookTimer = 0;
    this.spookFx = 0; this.spookFy = 0; this.spookImpulseFrames = 0;
    this.canSpread = false;
    this.prevAngle = Math.atan2(this.vy, this.vx);
    this.bankTilt = 0;
    this.sfx = 0; this.sfy = 0;
    // Per-boid trait multipliers — resampled when individuality changes
    this.tSep     = traitVariance();
    this.tAli     = traitVariance();
    this.tCoh     = traitVariance();
    this.tSpeed   = traitVariance();
    this.tTurn    = traitVariance();
    this.tInertia = traitVariance();
  }

  spook() {
    if (this.spookTimer > 0) return;
    this.spookTimer = SPOOK_DURATION;
    // Store spook impulse as a pending force applied gradually over 8 frames,
    // not as an instant velocity kick — prevents single-frame direction flip.
    const a = Math.atan2(this.vy, this.vx) + Math.PI + (Math.random() - 0.5) * 1.2;
    this.spookFx = Math.cos(a) * SPOOK_FORCE / 4;
    this.spookFy = Math.sin(a) * SPOOK_FORCE / 4;
    this.spookImpulseFrames = 4;
    this.canSpread = true; // only direct spooks spread cascade
  }

  spookSecondary() {
    // Cascade infection — color change only, no impulse, doesn't re-spread
    if (this.spookTimer > 0) return;
    this.spookTimer = SPOOK_DURATION;
    this.spookFx = 0; this.spookFy = 0;
    this.spookImpulseFrames = 0;
    this.canSpread = false;
  }
}

let flock = Array.from({length: 60}, () => new Boid());
initBoidCountSlider();

// Hawk system — declared after flock and Boid
const HAWK_SPEED_CRUISE = 2.2;
const HAWK_SPEED_CHASE  = 5.5;
const HAWK_VISION_ANGLE = Math.PI * 0.6; // ~108° cone — wide enough to reliably acquire
const HAWK_VISION_DIST  = 180;
const HAWK_KILL_DIST    = 10;
const HAWK_TURN_RATE    = 0.045;
let hawks = [];

class Hawk {
  constructor() {
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { this.x = Math.random() * W; this.y = 0; }
    else if (edge === 1) { this.x = W; this.y = Math.random() * H; }
    else if (edge === 2) { this.x = Math.random() * W; this.y = H; }
    else { this.x = 0; this.y = Math.random() * H; }
    const a = Math.random() * Math.PI * 2;
    this.vx = Math.cos(a) * HAWK_SPEED_CRUISE;
    this.vy = Math.sin(a) * HAWK_SPEED_CRUISE;
    this.angle = a;
    this.target = null;
    this.chasing = false;
    this.stuckTimer = 0;
    this.wasChasing = false;
    this.controlled = false;   // true = player controlled
    this.controlVx = 0;        // joystick input velocity
    this.controlVy = 0;
  }

  update() {
    if (this.controlled) {
      // Player controlled — follow joystick input
      const spd = Math.sqrt(this.controlVx*this.controlVx + this.controlVy*this.controlVy);
      if (spd > 0.01) {
        this.angle = Math.atan2(this.controlVy, this.controlVx);
        this.vx = this.controlVx;
        this.vy = this.controlVy;
      } else {
        // Finger lifted — circle gently
        this.angle += 0.025;
        this.vx = Math.cos(this.angle) * HAWK_SPEED_CRUISE;
        this.vy = Math.sin(this.angle) * HAWK_SPEED_CRUISE;
      }
      this.x += this.vx;
      this.y += this.vy;
      // Still kill boids when controlled
      for (const b of flock) {
        const dx = b.x - this.x, dy = b.y - this.y;
        if (dx*dx + dy*dy < HAWK_KILL_DIST * HAWK_KILL_DIST) {
          const idx = flock.indexOf(b);
          if (idx !== -1) { flock.splice(idx, 1); playKillSound(); break; }
        }
      }
      if (flock.length === 0) {
        setTimeout(() => {
          const n = parseInt(document.getElementById('boidcount').value);
          for (let i = 0; i < n; i++) flock.push(new Boid());
          hawks = [];
        }, 1500);
      }
      // Spook nearby boids
      for (const b of flock) {
        const dx2 = b.x - this.x, dy2 = b.y - this.y;
        if (dx2*dx2 + dy2*dy2 < HAWK_VISION_DIST * HAWK_VISION_DIST) b.spook();
      }
      // Clamp to edges — stop at wall, don't wrap
      if (this.x < 0) { this.x = 0; if (this.controlVx < 0) this.controlVx = 0; }
      if (this.x > W) { this.x = W; if (this.controlVx > 0) this.controlVx = 0; }
      if (this.y < 0) { this.y = 0; if (this.controlVy < 0) this.controlVy = 0; }
      if (this.y > H) { this.y = H; if (this.controlVy > 0) this.controlVy = 0; }
      return;
    }

    // Autonomous mode
    this.target = null;
    let bestDist = Infinity;
    for (const b of flock) {
      const dx = b.x - this.x, dy = b.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > HAWK_VISION_DIST) continue;
      const angleToB = Math.atan2(dy, dx);
      let diff = angleToB - this.angle;
      if (diff > Math.PI) diff -= 2 * Math.PI;
      if (diff < -Math.PI) diff += 2 * Math.PI;
      if (Math.abs(diff) < HAWK_VISION_ANGLE && d < bestDist) {
        bestDist = d; this.target = b;
      }
    }
    const prevChasing = this.wasChasing;
    this.chasing = !!this.target;
    if (this.chasing && !prevChasing) playHawkAha();
    this.wasChasing = this.chasing;
    if (this.chasing) {
      this.stuckTimer = 0;
      const dx = this.target.x - this.x, dy = this.target.y - this.y;
      const desired = Math.atan2(dy, dx);
      let turn = desired - this.angle;
      if (turn > Math.PI) turn -= 2 * Math.PI;
      if (turn < -Math.PI) turn += 2 * Math.PI;
      this.angle += Math.sign(turn) * Math.min(Math.abs(turn), HAWK_TURN_RATE * 2.5);
      for (const b of flock) {
        const dx2 = b.x - this.x, dy2 = b.y - this.y;
        if (dx2*dx2 + dy2*dy2 < HAWK_VISION_DIST * HAWK_VISION_DIST) b.spook();
      }
    } else {
      this.stuckTimer++;
      // After 90 frames without a target, snap heading directly at flock centroid
      if (this.stuckTimer > 90 && flock.length > 0) {
        let cx = 0, cy = 0;
        for (const b of flock) { cx += b.x; cy += b.y; }
        cx /= flock.length; cy /= flock.length;
        this.angle = Math.atan2(cy - this.y, cx - this.x);
        this.stuckTimer = 0;
      } else if (flock.length > 0) {
        // Lazy turn toward centroid — clamped to prevent spiral accumulation
        let cx = 0, cy = 0;
        for (const b of flock) { cx += b.x; cy += b.y; }
        cx /= flock.length; cy /= flock.length;
        const desired = Math.atan2(cy - this.y, cx - this.x);
        let turn = desired - this.angle;
        if (turn > Math.PI) turn -= 2 * Math.PI;
        if (turn < -Math.PI) turn += 2 * Math.PI;
        // Hard clamp: never more than HAWK_TURN_RATE per frame in cruise
        this.angle += Math.sign(turn) * Math.min(Math.abs(turn), HAWK_TURN_RATE);
      }
      // Edge avoidance — additive but bounded
      const margin = 120;
      const ea = 0.05;
      if (this.x < margin) this.angle += ea * Math.pow(1 - this.x / margin, 2);
      if (this.x > W - margin) this.angle -= ea * Math.pow(1 - (W - this.x) / margin, 2);
      if (this.y < margin) this.angle += ea * Math.pow(1 - this.y / margin, 2);
      if (this.y > H - margin) this.angle -= ea * Math.pow(1 - (H - this.y) / margin, 2);
    }
    const spd = this.chasing ? HAWK_SPEED_CHASE : HAWK_SPEED_CRUISE;
    this.vx = Math.cos(this.angle) * spd;
    this.vy = Math.sin(this.angle) * spd;
    this.x += this.vx;
    this.y += this.vy;
    if (this.target) {
      const dx = this.target.x - this.x, dy = this.target.y - this.y;
      if (dx*dx + dy*dy < HAWK_KILL_DIST * HAWK_KILL_DIST) {
        const idx = flock.indexOf(this.target);
        if (idx !== -1) flock.splice(idx, 1);
        playKillSound();
        this.target = null;
        if (flock.length === 0) {
          setTimeout(() => {
            const n = parseInt(document.getElementById('boidcount').value);
            for (let i = 0; i < n; i++) flock.push(new Boid());
            hawks = [];
          }, 1500);
        }
      }
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    const s = this.chasing ? 9 : 7;
    ctx.beginPath();
    ctx.moveTo(s * 2.5, 0);
    ctx.lineTo(-s, s * 1.1);
    ctx.lineTo(-s * 0.4, 0);
    ctx.lineTo(-s, -s * 1.1);
    ctx.closePath();
    ctx.fillStyle = this.controlled ? '#cc44ff' : (this.chasing ? '#ff4400' : '#cc8800');
    ctx.fill();
    if (!this.chasing) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, HAWK_VISION_DIST * 0.4, -HAWK_VISION_ANGLE, HAWK_VISION_ANGLE);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(255,180,0,0.12)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();
  }
}

function initHawkButton() {
  document.getElementById('hawkBtn').addEventListener('click', function() {
    try {
      initAudio();
      hawks.push(new Hawk());
      playHawkScreech();
    } catch(e) {
      document.getElementById('audioStatus').textContent = 'hawk err: ' + e.message;
    }
  });
  document.getElementById('muteBtn').addEventListener('click', function() {
    try {
      initAudio();
      if (!audioReady) {
        document.getElementById('audioStatus').textContent = 'not ready yet';
        return;
      }
      audioMuted = !audioMuted;
      masterGain.gain.setTargetAtTime(audioMuted ? 0 : 1.0, audioCtx.currentTime, 0.05);
      this.textContent = audioMuted ? '♪ SOUND OFF' : '♪ SOUND ON';
    } catch(e) {
      document.getElementById('audioStatus').textContent = 'mute err: ' + e.message;
    }
  });
}
initHawkButton();

function around(b) {
  const neighbors = [];
  const r2 = params.radius * params.radius;
  for (const o of flock) {
    if (o === b) continue;
    const dx = o.x - b.x;
    const dy = o.y - b.y;
    if (dx*dx + dy*dy < r2) neighbors.push(o);
  }
  return neighbors;
}

// Single pairwise neighbor force replacing separate avoid + center.
// Each neighbor pair has three zones:
//   d < innerZone  → repel (positional nudge, not heading change)
//   innerZone < d < outerZone → neutral dead band
//   outerZone < d < cohRadius → attract (cohesion pull)
// The dead band is the key — boids that are already at a comfortable
// distance feel no force at all, which kills the oscillation.
const INNER_ZONE  = 18;  // closer than this → push apart
const DEAD_BAND   = 38;  // comfortable spacing — no force
const COH_RADIUS  = 55;  // farther than this (up to perception radius) → pull together

function neighborForces(near, b) {
  let sepX = 0, sepY = 0; // positional nudge (no heading change)
  let cohX = 0, cohY = 0; // heading force
  let cohCount = 0;

  for (const o of near) {
    const dx = b.x - o.x;
    const dy = b.y - o.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 0.01;

    if (d < INNER_ZONE) {
      // Repulsion: smooth falloff, applied as positional nudge
      const strength = (INNER_ZONE - d) / INNER_ZONE;
      sepX += (dx / d) * strength;
      sepY += (dy / d) * strength;
    } else if (d > DEAD_BAND && d < COH_RADIUS) {
      // Attraction: pull toward neighbor, scaled by how far past dead band
      const strength = (d - DEAD_BAND) / (COH_RADIUS - DEAD_BAND);
      cohX += (-dx / d) * strength;
      cohY += (-dy / d) * strength;
      cohCount++;
    }
    // dead band: no force
  }

  // Cap sep magnitude
  const sepMag = Math.sqrt(sepX*sepX + sepY*sepY);
  if (sepMag > 2.0) { sepX = sepX/sepMag*2.0; sepY = sepY/sepMag*2.0; }

  // Average cohesion
  if (cohCount > 0) { cohX /= cohCount; cohY /= cohCount; }

  return { sepX, sepY, cohX, cohY };
}

function align(near) {
  if (!near.length) return {x: 0, y: 0};
  let ax = 0, ay = 0;
  for (const o of near) { ax += o.vx; ay += o.vy; }
  return {x: ax / near.length, y: ay / near.length};
}

function limit(vx, vy, max) {
  const spd = Math.sqrt(vx*vx + vy*vy);
  if (spd > max) { return {x: vx/spd*max, y: vy/spd*max}; }
  return {x: vx, y: vy};
}

function triggerSpookCascade() {
  // Pick one random boid to spook
  const seed = flock[Math.floor(Math.random() * flock.length)];
  seed.spook();
}

function updateSpooks() {
  frameCount++;

  // Schedule random spook events
  if (frameCount >= nextSpookIn) {
    triggerSpookCascade();
    nextSpookIn = frameCount + spookInterval() * (0.7 + Math.random() * 0.6);
  }

  // Cascade: only directly-spooked boids (canSpread) infect neighbors once
  const r2 = SPOOK_CONTAGION_RADIUS * SPOOK_CONTAGION_RADIUS;
  for (const b of flock) {
    if (!b.canSpread || b.spookTimer <= 0) continue;
    for (const o of flock) {
      if (o === b || o.spookTimer > 0) continue;
      const dx = o.x - b.x, dy = o.y - b.y;
      if (dx*dx + dy*dy < r2 && Math.random() < SPOOK_CONTAGION_PROB * 0.06) {
        o.spookSecondary();
      }
    }
  }

  // Tick down spook timers and update color
  for (const b of flock) {
    if (b.spookTimer > 0) {
      b.spookTimer--;
      const t = b.spookTimer / SPOOK_DURATION;
      b.color = t > 0
        ? `hsl(55, 100%, ${55 + t * 20}%)`
        : '#7eb8f7';
      // When spook expires, flush EMA and snap speed back to normal
      if (b.spookTimer === 0) {
        b.sfx = 0; b.sfy = 0;
        b.spookImpulseFrames = 0;
        const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (spd > 0.01) {
          b.vx = b.vx / spd * params.maxSpeed;
          b.vy = b.vy / spd * params.maxSpeed;
        }
      }
    } else {
      b.color = b.baseColor;
    }
  }
}

function update() {
  updateSpooks();
  const ms = params.maxSpeed;
  const minSpeed = ms * 0.4;

  for (const b of flock) {
    const near = around(b);
    const _nf = neighborForces(near, b);
    const sepX = _nf.sepX, sepY = _nf.sepY, cohX = _nf.cohX, cohY = _nf.cohY;
    const ali = align(near);

    // Density slider scales cohesion pull strength
    let cohScale = 1.0;
    if (params.density > 0) {
      const localDensity = Math.min(near.length / 18, 1.0);
      cohScale = Math.max(0.1, 1.0 - localDensity * params.density * 0.8);
    }

    // Hawk evasion — boids flee any hawk within panic radius
    for (const hawk of hawks) {
      const hdx = b.x - hawk.x, hdy = b.y - hawk.y;
      const hd2 = hdx*hdx + hdy*hdy;
      const panicR = 140;
      if (hd2 < panicR * panicR) {
        const hd = Math.sqrt(hd2) || 0.01;
        const strength = (panicR - hd) / panicR;
        b.vx += (hdx / hd) * strength * 1.5;
        b.vy += (hdy / hd) * strength * 1.5;
        b.spook();
      }
    }

    // Edge avoidance applied BEFORE smoothing so it doesn't accumulate in EMA.
    // When near a wall, also reset the force accumulator so smoothing doesn't
    // fight the avoidance for several frames afterward.
    const margin = 150;
    const edgeStr = 0.6;
    let edgeVx = 0, edgeVy = 0;
    if (b.x < margin)     edgeVx += edgeStr * Math.pow(1 - b.x / margin, 2);
    if (b.x > W - margin) edgeVx -= edgeStr * Math.pow(1 - (W - b.x) / margin, 2);
    if (b.y < margin)     edgeVy += edgeStr * Math.pow(1 - b.y / margin, 2);
    if (b.y > H - margin) edgeVy -= edgeStr * Math.pow(1 - (H - b.y) / margin, 2);
    if (edgeVx !== 0 || edgeVy !== 0) {
      b.vx += edgeVx;
      b.vy += edgeVy;
      // Reset EMA so smoothing doesn't carry wall-fighting forces forward
      b.sfx = 0; b.sfy = 0;
    }

    let dvx = params.ali * b.tAli * ali.x + params.coh * cohScale * b.tCoh * cohX;
    let dvy = params.ali * b.tAli * ali.y + params.coh * cohScale * b.tCoh * cohY;

    if (params.smoothing > 0) {
      const a = params.smoothing;
      b.sfx = a * b.sfx + (1 - a) * dvx;
      b.sfy = a * b.sfy + (1 - a) * dvy;
      dvx = b.sfx;
      dvy = b.sfy;
    } else {
      b.sfx = dvx;
      b.sfy = dvy;
    }

    if (params.inertia > 0) {
      const targetVx = b.vx + dvx;
      const targetVy = b.vy + dvy;
      const t = 1.0 - params.inertia * b.tInertia;
      b.vx += (targetVx - b.vx) * Math.max(0.02, t);
      b.vy += (targetVy - b.vy) * Math.max(0.02, t);
    } else {
      b.vx += dvx;
      b.vy += dvy;
    }

    // Velocity noise
    if (params.velNoise > 0) {
      const angle = Math.atan2(b.vy, b.vx);
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      const noiseAngle = angle + (Math.random() - 0.5) * 2 * params.velNoise;
      b.vx = Math.cos(noiseAngle) * spd;
      b.vy = Math.sin(noiseAngle) * spd;
    }

    // Apply gradual spook impulse if active
    if (b.spookImpulseFrames > 0) {
      b.vx += b.spookFx;
      b.vy += b.spookFy;
      b.spookImpulseFrames--;
    }

    // Speed cap + minimum speed floor
    const speedCap = b.spookTimer > 0 ? ms * b.tSpeed * 2.4 : ms * b.tSpeed;
    const lv = limit(b.vx, b.vy, speedCap);
    b.vx = lv.x; b.vy = lv.y;

    // Decay excess speed back toward maxSpeed over ~8 frames
    const curSpd2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (curSpd2 > ms) {
      const decayed = curSpd2 + (ms - curSpd2) * 0.25;
      b.vx = b.vx / curSpd2 * decayed;
      b.vy = b.vy / curSpd2 * decayed;
    }

    const curSpd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (curSpd < minSpeed) {
      const a = Math.atan2(b.vy, b.vx);
      b.vx = Math.cos(a) * minSpeed;
      b.vy = Math.sin(a) * minSpeed;
    }

    // Turn rate clamp: limit how fast heading changes per frame
    const maxTurn = b.spookTimer > 0 ? params.turnRate * b.tTurn * 3 : params.turnRate * b.tTurn;
    const curAngle = Math.atan2(b.vy, b.vx);
    let dAngle = curAngle - b.prevAngle;
    if (dAngle > Math.PI) dAngle -= 2 * Math.PI;
    if (dAngle < -Math.PI) dAngle += 2 * Math.PI;
    if (Math.abs(dAngle) > maxTurn) {
      const clampedAngle = b.prevAngle + Math.sign(dAngle) * maxTurn;
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      b.vx = Math.cos(clampedAngle) * spd;
      b.vy = Math.sin(clampedAngle) * spd;
    }

    // Forward-only: accumulated heading must stay within ±90° of prevAngle.
    // This is a safety net against force sum reversals, not a per-frame limit.
    const finalAngle = Math.atan2(b.vy, b.vx);
    let fwdDiff = finalAngle - b.prevAngle;
    if (fwdDiff > Math.PI) fwdDiff -= 2 * Math.PI;
    if (fwdDiff < -Math.PI) fwdDiff += 2 * Math.PI;
    if (Math.abs(fwdDiff) > Math.PI * 0.5) {
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      b.vx = Math.cos(b.prevAngle + Math.sign(fwdDiff) * Math.PI * 0.5) * spd;
      b.vy = Math.sin(b.prevAngle + Math.sign(fwdDiff) * Math.PI * 0.5) * spd;
    }

    // Banking
    if (params.banking > 0) {
      let bankDelta = Math.atan2(b.vy, b.vx) - b.prevAngle;
      if (bankDelta > Math.PI) bankDelta -= 2 * Math.PI;
      if (bankDelta < -Math.PI) bankDelta += 2 * Math.PI;
      b.bankTilt += (bankDelta * 18 * params.banking - b.bankTilt) * 0.15;
      b.bankTilt = Math.max(-1.1, Math.min(1.1, b.bankTilt));
    } else {
      b.bankTilt = 0;
    }

    b.prevAngle = Math.atan2(b.vy, b.vx);

    b.x += b.vx;
    b.y += b.vy;

    // Separation as positional nudge — no heading change
    b.x += sepX * params.sep * b.tSep * 0.6;
    b.y += sepY * params.sep * b.tSep * 0.6;

    // Hard clamp
    b.x = Math.max(0, Math.min(W, b.x));
    b.y = Math.max(0, Math.min(H, b.y));
  }
}

function draw() {
  // dark trail
  ctx.fillStyle = 'rgba(10,10,15,0.35)';
  ctx.fillRect(0, 0, W, H);

  for (const b of flock) {
    const angle = Math.atan2(b.vy, b.vx);
    const s = b.size;

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    if (b.bankTilt !== 0) ctx.rotate(b.bankTilt * 0.5);
    const bankScale = 1.0 + Math.abs(b.bankTilt) * 0.3;
    ctx.scale(1, bankScale);

    ctx.beginPath();
    ctx.moveTo(s * 2.2, 0);
    ctx.lineTo(-s, s * 0.7);
    ctx.lineTo(-s * 0.5, 0);
    ctx.lineTo(-s, -s * 0.7);
    ctx.closePath();
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.restore();
  }
}

// Tap zones: decaying repulsion boundaries
const tapZones = [];
const TAP_ZONE_RADIUS = 100;
const TAP_ZONE_LIFE = 90; // frames (~1.5s at 60fps)

function addTapZone(x, y) {
  tapZones.push({ x, y, life: TAP_ZONE_LIFE });
  // Spook nearby boids once on tap
  const r2 = TAP_ZONE_RADIUS * TAP_ZONE_RADIUS;
  for (const b of flock) {
    const dx = b.x - x, dy = b.y - y;
    if (dx*dx + dy*dy < r2) b.spook();
  }
}

function updateTapZones() {
  for (let i = tapZones.length - 1; i >= 0; i--) {
    tapZones[i].life--;
    if (tapZones[i].life <= 0) tapZones.splice(i, 1);
  }
}

function applyTapZones() {
  for (const zone of tapZones) {
    const t = zone.life / TAP_ZONE_LIFE; // 1=fresh, 0=expired
    const radius = TAP_ZONE_RADIUS;
    const r2 = radius * radius;
    for (const b of flock) {
      const dx = b.x - zone.x, dy = b.y - zone.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < r2 && d2 > 0.01) {
        const d = Math.sqrt(d2);
        // Force strongest at center, fades with distance and zone age
        const strength = t * (1 - d / radius) * 0.8;
        b.vx += (dx / d) * strength;
        b.vy += (dy / d) * strength;
      }
    }
  }
}

function drawTapZones() {
  for (const zone of tapZones) {
    const t = zone.life / TAP_ZONE_LIFE;
    ctx.beginPath();
    ctx.arc(zone.x, zone.y, TAP_ZONE_RADIUS * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 220, 100, ${t * 0.25})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ── AUDIO SYSTEM ──────────────────────────────────────────────────────────
let audioCtx   = null;
let masterGain = null;
let flockDrone = null;
let drone2     = null;
let droneGain  = null;
let droneGain2 = null;
let hawkTone   = null;
let hawkGain   = null;
let audioMuted = false;
let audioReady = false;
let audioCreating = false;

function initAudio() {
  if (audioReady) return;
  if (audioCreating) {
    // Already building — just try to resume if context exists
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCreating = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);

    audioCtx.resume().then(function() {
      document.getElementById('audioStatus').textContent = 'state: ' + audioCtx.state;

      // Test tone — direct to destination, 0.2s delay
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 440;
      osc.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + 0.2);
      osc.stop(audioCtx.currentTime + 1.0);

      audioReady = true;
      setTimeout(buildAudioGraph, 300);
    }).catch(function(err) {
      document.getElementById('audioStatus').textContent = 'resume err: ' + err.message;
      audioCreating = false;
    });
  } catch(e) {
    document.getElementById('audioStatus').textContent = 'init err: ' + e.message;
    audioCreating = false;
  }
}

function buildAudioGraph() {
  flockDrone = audioCtx.createOscillator();
  flockDrone.type = 'sine';
  flockDrone.frequency.value = 80;
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.3;
  flockDrone.connect(droneGain);
  droneGain.connect(masterGain);
  flockDrone.start();

  drone2 = audioCtx.createOscillator();
  drone2.type = 'sine';
  drone2.frequency.value = 81.5;
  droneGain2 = audioCtx.createGain();
  droneGain2.gain.value = 0.2;
  drone2.connect(droneGain2);
  droneGain2.connect(masterGain);
  drone2.start();
}

function playKillSound() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(500, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.25);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.connect(g);
  g.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playHawkAha() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  // Two quick rising tones — "aha!" shape
  [0, 0.08].forEach(function(offset, i) {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = 'sine';
    const freq = i === 0 ? 520 : 780;
    osc.frequency.setValueAtTime(freq * 0.85, now + offset);
    osc.frequency.exponentialRampToValueAtTime(freq, now + offset + 0.06);
    g.gain.setValueAtTime(0.0, now + offset);
    g.gain.linearRampToValueAtTime(0.22, now + offset + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.12);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now + offset);
    osc.stop(now + offset + 0.15);
  });
}

function playHawkScreech() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  // Descending screech: fast FM sweep from high to mid with vibrato
  const now = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const mod  = audioCtx.createOscillator(); // vibrato modulator
  const modG = audioCtx.createGain();
  const g    = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1800, now);
  osc.frequency.exponentialRampToValueAtTime(600, now + 0.35);
  osc.frequency.exponentialRampToValueAtTime(900, now + 0.55);
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.8);
  mod.type = 'sine';
  mod.frequency.value = 18;
  modG.gain.value = 60;
  mod.connect(modG);
  modG.connect(osc.frequency);
  g.gain.setValueAtTime(0.0, now);
  g.gain.linearRampToValueAtTime(0.3, now + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.85);
  osc.connect(g);
  g.connect(masterGain);
  mod.start(now); osc.start(now);
  mod.stop(now + 0.9); osc.stop(now + 0.9);
}

function updateAudio() {
  if (!audioReady || !audioCtx || audioCtx.state !== 'running') return;
  if (!flockDrone || !drone2 || !droneGain || !droneGain2) return;
  if (flock.length === 0) return;
  const now = audioCtx.currentTime;

  // Flock spread → drone pitch and volume
  let cx = 0, cy = 0;
  for (const b of flock) { cx += b.x; cy += b.y; }
  cx /= flock.length; cy /= flock.length;
  let spread = 0;
  for (const b of flock) {
    const dx = b.x - cx, dy = b.y - cy;
    spread += Math.sqrt(dx*dx + dy*dy);
  }
  spread /= flock.length;
  const coherence = Math.min(spread / (Math.min(W, H) * 0.4), 1.0);

  const pitch = 55 + coherence * 90;
  const vol   = 0.06 + coherence * 0.12;
  flockDrone.frequency.setTargetAtTime(pitch, now, 0.8);
  drone2.frequency.setTargetAtTime(pitch + 1.5, now, 0.8);
  droneGain.gain.setTargetAtTime(vol, now, 0.5);
  droneGain2.gain.setTargetAtTime(vol * 0.6, now, 0.5);
}
// ── END AUDIO ─────────────────────────────────────────────────────────────

let loopErrorShown = false;
function loop() {
  try {
    updateTapZones();
    update();
    applyTapZones();
    for (const hawk of hawks) hawk.update();
    draw();
    drawTapZones();
    for (const hawk of hawks) hawk.draw();
    try { updateAudio(); } catch(ae) {
      if (!loopErrorShown) {
        loopErrorShown = true;
        var el = document.getElementById('audioStatus');
        if (el) el.textContent = 'audio err: ' + ae.message;
      }
    }
  } catch(e) {
    if (!loopErrorShown) {
      loopErrorShown = true;
      var el = document.getElementById('audioStatus');
      if (el) el.textContent = 'loop err: ' + e.message + ' L' + (e.lineNumber || '?');
    }
  }
  requestAnimationFrame(loop);
}

loop();

// ── JOYSTICK ──────────────────────────────────────────────────────────────
(function() {
  const pad   = document.getElementById('joystickPad');
  const knob  = document.getElementById('joystickKnob');
  const PAD_R = 55; // radius of pad
  const MAX_SPEED = HAWK_SPEED_CHASE * 1.2;
  let activeId = null;
  let padRect = null;
  let isTap = false;
  let tapStart = 0;

  function getControlledHawk() {
    // Most recently spawned hawk that is controlled, or most recent overall
    for (let i = hawks.length - 1; i >= 0; i--) {
      if (hawks[i].controlled) return hawks[i];
    }
    return hawks.length > 0 ? hawks[hawks.length - 1] : null;
  }

  function setKnob(dx, dy) {
    knob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  }

  pad.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    padRect = pad.getBoundingClientRect();
    activeId = e.pointerId;
    isTap = true;
    tapStart = Date.now();
    pad.setPointerCapture(e.pointerId);

    const h = getControlledHawk();
    if (h && !h.controlled) {
      h.controlled = true;
      h.controlVx = 0;
      h.controlVy = 0;
    }
  });

  pad.addEventListener('pointermove', function(e) {
    if (e.pointerId !== activeId) return;
    if (!padRect) return;
    isTap = false; // moved — not a tap

    const cx = padRect.left + padRect.width / 2;
    const cy = padRect.top  + padRect.height / 2;
    let dx = e.clientX - cx;
    let dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Clamp knob to pad radius visually
    const clampedDist = Math.min(dist, PAD_R * 0.7);
    const angle = Math.atan2(dy, dx);
    setKnob(Math.cos(angle) * clampedDist, Math.sin(angle) * clampedDist);

    // Map distance to speed
    const t = Math.min(dist / PAD_R, 1.0);
    const spd = t * MAX_SPEED;
    const h = getControlledHawk();
    if (h && h.controlled) {
      h.controlVx = Math.cos(angle) * spd;
      h.controlVy = Math.sin(angle) * spd;
    }
  });

  function onRelease(e) {
    if (e.pointerId !== activeId) return;
    activeId = null;
    setKnob(0, 0);

    const h = getControlledHawk();
    if (!h) return;

    if (isTap && Date.now() - tapStart < 250) {
      // Tap — return to autonomous
      h.controlled = false;
      h.controlVx = 0;
      h.controlVy = 0;
    } else {
      // Finger lifted — keep controlled but zero input (hawk will circle)
      h.controlVx = 0;
      h.controlVy = 0;
    }
  }

  pad.addEventListener('pointerup', onRelease);
  pad.addEventListener('pointercancel', onRelease);
})();
// ── END JOYSTICK ───────────────────────────────────────────────────────────

canvas.addEventListener('touchend', function(e) {
  var s = document.getElementById('silenceUnlock');
  if (s) {
    s.play().then(function() {
      s.pause();
      s.currentTime = 0;
      initAudio();
    }).catch(function() {
      initAudio(); // fallback if silence.mp3 fails
    });
  } else {
    initAudio();
  }
}, { passive: true });

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  addTapZone(e.clientX - rect.left, e.clientY - rect.top);
});
