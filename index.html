<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'DM Mono', monospace; }
  canvas { display: block; }

  #controls {
    position: fixed;
    top: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
    padding-bottom: 8px;
  }
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .slider-row label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    display: flex;
    justify-content: space-between;
  }
  .slider-row label span { color: rgba(255,255,255,0.65); }
  input[type=range] {
    -webkit-appearance: none;
    width: 140px;
    height: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
    border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #7eb8f7;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="controls">
  <div class="slider-row">
    <label>SEPARATION <span id="ls">0.8</span></label>
    <input type="range" id="sep" min="0" max="4" step="0.1" value="0.8">
  </div>
  <div class="slider-row">
    <label>ALIGNMENT <span id="la">2.8</span></label>
    <input type="range" id="ali" min="0" max="4" step="0.1" value="2.8">
  </div>
  <div class="slider-row">
    <label>COHESION <span id="lc">1.2</span></label>
    <input type="range" id="coh" min="0" max="4" step="0.1" value="1.2">
  </div>
  <div class="slider-row">
    <label>RADIUS <span id="lr">120</span></label>
    <input type="range" id="rad" min="20" max="200" step="5" value="120">
  </div>
  <div class="slider-row">
    <label>SPEED <span id="lsp">2.5</span></label>
    <input type="range" id="spd" min="0.5" max="8" step="0.25" value="2.5">
  </div>
  <div class="slider-row">
    <label>VELOCITY NOISE <span id="lvn">0.04</span></label>
    <input type="range" id="vnoise" min="0" max="0.3" step="0.01" value="0.04">
  </div>
  <div class="slider-row">
    <label>INERTIA <span id="lin">0.75</span></label>
    <input type="range" id="inertia" min="0" max="0.98" step="0.01" value="0.75">
  </div>
  <div class="slider-row">
    <label>DENSITY <span id="lden">0.60</span></label>
    <input type="range" id="density" min="0" max="1" step="0.01" value="0.60">
  </div>
  <div class="slider-row">
    <label>BANKING <span id="lbnk">0.50</span></label>
    <input type="range" id="banking" min="0" max="1" step="0.01" value="0.50">
  </div>
  <div class="slider-row">
    <label>SMOOTHING <span id="lsmth">0.55</span></label>
    <input type="range" id="smoothing" min="0" max="0.97" step="0.01" value="0.55">
  </div>
  <div class="slider-row">
    <label>TURN RATE <span id="ltr">0.06</span></label>
    <input type="range" id="turnrate" min="0.01" max="0.30" step="0.01" value="0.06">
  </div>
  <div class="slider-row">
    <label>BOIDS <span id="lbc">60</span></label>
    <input type="range" id="boidcount" min="10" max="500" step="10" value="60">
  </div>
  <div class="slider-row">
    <button id="calmBtn" style="
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.65);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      width: 140px;
    ">CALM</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Params
let params = {
  sep: 0.8,
  ali: 2.8,
  coh: 1.2,
  radius: 120,
  maxSpeed: 2.5,
  count: 60,
  spookRate: 0,
  velNoise: 0.04,
  inertia: 0.75,
  density: 0.60,
  banking: 0.50,
  smoothing: 0.55,
  turnRate: 0.06
};

// Wire up sliders
function wire(id, key, labelId, uiId) {
  const el = document.getElementById(id);
  const lbl = document.getElementById(labelId);
  const ui = document.getElementById(uiId);
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    lbl.textContent = el.value;
    if (ui) ui.textContent = el.value;
  });
}
wire('sep','sep','ls',null);
wire('ali','ali','la',null);
wire('coh','coh','lc',null);
wire('rad','radius','lr',null);
wire('spd','maxSpeed','lsp',null);

wire('vnoise','velNoise','lvn',null);
wire('inertia','inertia','lin',null);
wire('density','density','lden',null);
wire('banking','banking','lbnk',null);
wire('smoothing','smoothing','lsmth',null);
wire('turnrate','turnRate','ltr',null);

function initCalmButton() {
  document.getElementById('calmBtn').addEventListener('click', function() {
    for (const b of flock) {
      b.spookTimer = 0;
      b.spookImpulseFrames = 0;
      b.spookFx = 0; b.spookFy = 0;
      b.canSpread = false;
      b.sfx = 0; b.sfy = 0;
      b.color = b.baseColor;
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      if (spd > 0.01) {
        b.vx = b.vx / spd * params.maxSpeed;
        b.vy = b.vy / spd * params.maxSpeed;
      }
    }
  });
}
function initBoidCountSlider() {
  document.getElementById('boidcount').addEventListener('input', function() {
    const n = parseInt(this.value);
    document.getElementById('lbc').textContent = n;
    while (flock.length < n) flock.push(new Boid());
    if (flock.length > n) flock.length = n;
  });
}

// Spook system
// spookRate 0 = disabled, 10 = very frequent (~every 60 frames)
// Maps rate 1-10 → interval 600-60 frames (exponential feel)
const SPOOK_DURATION = 8;
const SPOOK_FORCE = 7;
const SPOOK_CONTAGION_RADIUS = 90;
const SPOOK_CONTAGION_PROB = 0.25;

function spookInterval() {
  if (params.spookRate === 0) return Infinity;
  // rate 1→600f, rate 10→60f
  return Math.round(600 - (params.spookRate - 1) * (540 / 9));
}

let nextSpookIn = spookInterval();
let frameCount = 0;

// Boid class
class Boid {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const a = Math.random() * Math.PI * 2;
    this.vx = Math.cos(a) * params.maxSpeed;
    this.vy = Math.sin(a) * params.maxSpeed;
    this.color = '#7eb8f7';
    this.baseColor = this.color;
    this.size = 3.5 + Math.random() * 2;
    this.spookTimer = 0;
    this.spookFx = 0; this.spookFy = 0; this.spookImpulseFrames = 0;
    this.canSpread = false;
    this.prevAngle = Math.atan2(this.vy, this.vx);
    this.bankTilt = 0;
    // EMA steering force accumulators for smoothing
    this.sfx = 0; this.sfy = 0;
  }

  spook() {
    if (this.spookTimer > 0) return;
    this.spookTimer = SPOOK_DURATION;
    // Store spook impulse as a pending force applied gradually over 8 frames,
    // not as an instant velocity kick — prevents single-frame direction flip.
    const a = Math.atan2(this.vy, this.vx) + Math.PI + (Math.random() - 0.5) * 1.2;
    this.spookFx = Math.cos(a) * SPOOK_FORCE / 4;
    this.spookFy = Math.sin(a) * SPOOK_FORCE / 4;
    this.spookImpulseFrames = 4;
    this.canSpread = true; // only direct spooks spread cascade
  }

  spookSecondary() {
    // Cascade infection — color change only, no impulse, doesn't re-spread
    if (this.spookTimer > 0) return;
    this.spookTimer = SPOOK_DURATION;
    this.spookFx = 0; this.spookFy = 0;
    this.spookImpulseFrames = 0;
    this.canSpread = false;
  }
}

let flock = Array.from({length: 60}, () => new Boid());
initBoidCountSlider();
initCalmButton();

function around(b) {
  const neighbors = [];
  const r2 = params.radius * params.radius;
  for (const o of flock) {
    if (o === b) continue;
    const dx = o.x - b.x;
    const dy = o.y - b.y;
    if (dx*dx + dy*dy < r2) neighbors.push(o);
  }
  return neighbors;
}

// Single pairwise neighbor force replacing separate avoid + center.
// Each neighbor pair has three zones:
//   d < innerZone  → repel (positional nudge, not heading change)
//   innerZone < d < outerZone → neutral dead band
//   outerZone < d < cohRadius → attract (cohesion pull)
// The dead band is the key — boids that are already at a comfortable
// distance feel no force at all, which kills the oscillation.
const INNER_ZONE  = 18;  // closer than this → push apart
const DEAD_BAND   = 38;  // comfortable spacing — no force
const COH_RADIUS  = 55;  // farther than this (up to perception radius) → pull together

function neighborForces(near, b) {
  let sepX = 0, sepY = 0; // positional nudge (no heading change)
  let cohX = 0, cohY = 0; // heading force
  let cohCount = 0;

  for (const o of near) {
    const dx = b.x - o.x;
    const dy = b.y - o.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 0.01;

    if (d < INNER_ZONE) {
      // Repulsion: smooth falloff, applied as positional nudge
      const strength = (INNER_ZONE - d) / INNER_ZONE;
      sepX += (dx / d) * strength;
      sepY += (dy / d) * strength;
    } else if (d > DEAD_BAND && d < COH_RADIUS) {
      // Attraction: pull toward neighbor, scaled by how far past dead band
      const strength = (d - DEAD_BAND) / (COH_RADIUS - DEAD_BAND);
      cohX += (-dx / d) * strength;
      cohY += (-dy / d) * strength;
      cohCount++;
    }
    // dead band: no force
  }

  // Cap sep magnitude
  const sepMag = Math.sqrt(sepX*sepX + sepY*sepY);
  if (sepMag > 2.0) { sepX = sepX/sepMag*2.0; sepY = sepY/sepMag*2.0; }

  // Average cohesion
  if (cohCount > 0) { cohX /= cohCount; cohY /= cohCount; }

  return { sepX, sepY, cohX, cohY };
}

function align(near) {
  if (!near.length) return {x: 0, y: 0};
  let ax = 0, ay = 0;
  for (const o of near) { ax += o.vx; ay += o.vy; }
  return {x: ax / near.length, y: ay / near.length};
}

function limit(vx, vy, max) {
  const spd = Math.sqrt(vx*vx + vy*vy);
  if (spd > max) { return {x: vx/spd*max, y: vy/spd*max}; }
  return {x: vx, y: vy};
}

function triggerSpookCascade() {
  // Pick one random boid to spook
  const seed = flock[Math.floor(Math.random() * flock.length)];
  seed.spook();
}

function updateSpooks() {
  frameCount++;

  // Schedule random spook events
  if (frameCount >= nextSpookIn) {
    triggerSpookCascade();
    nextSpookIn = frameCount + spookInterval() * (0.7 + Math.random() * 0.6);
  }

  // Cascade: only directly-spooked boids (canSpread) infect neighbors once
  const r2 = SPOOK_CONTAGION_RADIUS * SPOOK_CONTAGION_RADIUS;
  for (const b of flock) {
    if (!b.canSpread || b.spookTimer <= 0) continue;
    for (const o of flock) {
      if (o === b || o.spookTimer > 0) continue;
      const dx = o.x - b.x, dy = o.y - b.y;
      if (dx*dx + dy*dy < r2 && Math.random() < SPOOK_CONTAGION_PROB * 0.06) {
        o.spookSecondary();
      }
    }
  }

  // Tick down spook timers and update color
  for (const b of flock) {
    if (b.spookTimer > 0) {
      b.spookTimer--;
      const t = b.spookTimer / SPOOK_DURATION;
      b.color = t > 0
        ? `hsl(55, 100%, ${55 + t * 20}%)`
        : '#7eb8f7';
      // When spook expires, flush EMA and snap speed back to normal
      if (b.spookTimer === 0) {
        b.sfx = 0; b.sfy = 0;
        b.spookImpulseFrames = 0;
        const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (spd > 0.01) {
          b.vx = b.vx / spd * params.maxSpeed;
          b.vy = b.vy / spd * params.maxSpeed;
        }
      }
    } else {
      b.color = b.baseColor;
    }
  }
}

function update() {
  updateSpooks();
  const ms = params.maxSpeed;
  const minSpeed = ms * 0.4;

  for (const b of flock) {
    const near = around(b);
    const _nf = neighborForces(near, b);
    const sepX = _nf.sepX, sepY = _nf.sepY, cohX = _nf.cohX, cohY = _nf.cohY;
    const ali = align(near);

    // Density slider scales cohesion pull strength
    let cohScale = 1.0;
    if (params.density > 0) {
      const localDensity = Math.min(near.length / 18, 1.0);
      cohScale = Math.max(0.1, 1.0 - localDensity * params.density * 0.8);
    }

    // Edge avoidance applied BEFORE smoothing so it doesn't accumulate in EMA.
    // When near a wall, also reset the force accumulator so smoothing doesn't
    // fight the avoidance for several frames afterward.
    const margin = 150;
    const edgeStr = 0.6;
    let edgeVx = 0, edgeVy = 0;
    if (b.x < margin)     edgeVx += edgeStr * Math.pow(1 - b.x / margin, 2);
    if (b.x > W - margin) edgeVx -= edgeStr * Math.pow(1 - (W - b.x) / margin, 2);
    if (b.y < margin)     edgeVy += edgeStr * Math.pow(1 - b.y / margin, 2);
    if (b.y > H - margin) edgeVy -= edgeStr * Math.pow(1 - (H - b.y) / margin, 2);
    if (edgeVx !== 0 || edgeVy !== 0) {
      b.vx += edgeVx;
      b.vy += edgeVy;
      // Reset EMA so smoothing doesn't carry wall-fighting forces forward
      b.sfx = 0; b.sfy = 0;
    }

    let dvx = params.ali * ali.x + params.coh * cohScale * cohX;
    let dvy = params.ali * ali.y + params.coh * cohScale * cohY;

    if (params.smoothing > 0) {
      const a = params.smoothing;
      b.sfx = a * b.sfx + (1 - a) * dvx;
      b.sfy = a * b.sfy + (1 - a) * dvy;
      dvx = b.sfx;
      dvy = b.sfy;
    } else {
      b.sfx = dvx;
      b.sfy = dvy;
    }

    if (params.inertia > 0) {
      const targetVx = b.vx + dvx;
      const targetVy = b.vy + dvy;
      const t = 1.0 - params.inertia;
      b.vx += (targetVx - b.vx) * t;
      b.vy += (targetVy - b.vy) * t;
    } else {
      b.vx += dvx;
      b.vy += dvy;
    }

    // Velocity noise
    if (params.velNoise > 0) {
      const angle = Math.atan2(b.vy, b.vx);
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      const noiseAngle = angle + (Math.random() - 0.5) * 2 * params.velNoise;
      b.vx = Math.cos(noiseAngle) * spd;
      b.vy = Math.sin(noiseAngle) * spd;
    }

    // Apply gradual spook impulse if active
    if (b.spookImpulseFrames > 0) {
      b.vx += b.spookFx;
      b.vy += b.spookFy;
      b.spookImpulseFrames--;
    }

    // Speed cap + minimum speed floor
    const speedCap = b.spookTimer > 0 ? ms * 2.4 : ms;
    const lv = limit(b.vx, b.vy, speedCap);
    b.vx = lv.x; b.vy = lv.y;

    // Decay excess speed back toward maxSpeed over ~8 frames
    const curSpd2 = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (curSpd2 > ms) {
      const decayed = curSpd2 + (ms - curSpd2) * 0.25;
      b.vx = b.vx / curSpd2 * decayed;
      b.vy = b.vy / curSpd2 * decayed;
    }

    const curSpd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (curSpd < minSpeed) {
      const a = Math.atan2(b.vy, b.vx);
      b.vx = Math.cos(a) * minSpeed;
      b.vy = Math.sin(a) * minSpeed;
    }

    // Turn rate clamp: limit how fast heading changes per frame
    const maxTurn = b.spookTimer > 0 ? params.turnRate * 3 : params.turnRate;
    const curAngle = Math.atan2(b.vy, b.vx);
    let dAngle = curAngle - b.prevAngle;
    if (dAngle > Math.PI) dAngle -= 2 * Math.PI;
    if (dAngle < -Math.PI) dAngle += 2 * Math.PI;
    if (Math.abs(dAngle) > maxTurn) {
      const clampedAngle = b.prevAngle + Math.sign(dAngle) * maxTurn;
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      b.vx = Math.cos(clampedAngle) * spd;
      b.vy = Math.sin(clampedAngle) * spd;
    }

    // Forward-only: accumulated heading must stay within ±90° of prevAngle.
    // This is a safety net against force sum reversals, not a per-frame limit.
    const finalAngle = Math.atan2(b.vy, b.vx);
    let fwdDiff = finalAngle - b.prevAngle;
    if (fwdDiff > Math.PI) fwdDiff -= 2 * Math.PI;
    if (fwdDiff < -Math.PI) fwdDiff += 2 * Math.PI;
    if (Math.abs(fwdDiff) > Math.PI * 0.5) {
      const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      b.vx = Math.cos(b.prevAngle + Math.sign(fwdDiff) * Math.PI * 0.5) * spd;
      b.vy = Math.sin(b.prevAngle + Math.sign(fwdDiff) * Math.PI * 0.5) * spd;
    }

    // Banking
    if (params.banking > 0) {
      let bankDelta = Math.atan2(b.vy, b.vx) - b.prevAngle;
      if (bankDelta > Math.PI) bankDelta -= 2 * Math.PI;
      if (bankDelta < -Math.PI) bankDelta += 2 * Math.PI;
      b.bankTilt += (bankDelta * 18 * params.banking - b.bankTilt) * 0.15;
      b.bankTilt = Math.max(-1.1, Math.min(1.1, b.bankTilt));
    } else {
      b.bankTilt = 0;
    }

    b.prevAngle = Math.atan2(b.vy, b.vx);

    b.x += b.vx;
    b.y += b.vy;

    // Separation as positional nudge — no heading change
    b.x += sepX * params.sep * 0.6;
    b.y += sepY * params.sep * 0.6;

    // Hard clamp
    b.x = Math.max(0, Math.min(W, b.x));
    b.y = Math.max(0, Math.min(H, b.y));
  }
}

function draw() {
  // dark trail
  ctx.fillStyle = 'rgba(10,10,15,0.35)';
  ctx.fillRect(0, 0, W, H);

  for (const b of flock) {
    const angle = Math.atan2(b.vy, b.vx);
    const s = b.size;

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    if (b.bankTilt !== 0) ctx.rotate(b.bankTilt * 0.5);
    const bankScale = 1.0 + Math.abs(b.bankTilt) * 0.3;
    ctx.scale(1, bankScale);

    ctx.beginPath();
    ctx.moveTo(s * 2.2, 0);
    ctx.lineTo(-s, s * 0.7);
    ctx.lineTo(-s * 0.5, 0);
    ctx.lineTo(-s, -s * 0.7);
    ctx.closePath();
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.restore();
  }
}

// Tap zones: decaying repulsion boundaries
const tapZones = [];
const TAP_ZONE_RADIUS = 100;
const TAP_ZONE_LIFE = 90; // frames (~1.5s at 60fps)

function addTapZone(x, y) {
  tapZones.push({ x, y, life: TAP_ZONE_LIFE });
  // Spook nearby boids once on tap
  const r2 = TAP_ZONE_RADIUS * TAP_ZONE_RADIUS;
  for (const b of flock) {
    const dx = b.x - x, dy = b.y - y;
    if (dx*dx + dy*dy < r2) b.spook();
  }
}

function updateTapZones() {
  for (let i = tapZones.length - 1; i >= 0; i--) {
    tapZones[i].life--;
    if (tapZones[i].life <= 0) tapZones.splice(i, 1);
  }
}

function applyTapZones() {
  for (const zone of tapZones) {
    const t = zone.life / TAP_ZONE_LIFE; // 1=fresh, 0=expired
    const radius = TAP_ZONE_RADIUS;
    const r2 = radius * radius;
    for (const b of flock) {
      const dx = b.x - zone.x, dy = b.y - zone.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < r2 && d2 > 0.01) {
        const d = Math.sqrt(d2);
        // Force strongest at center, fades with distance and zone age
        const strength = t * (1 - d / radius) * 0.8;
        b.vx += (dx / d) * strength;
        b.vy += (dy / d) * strength;
      }
    }
  }
}

function drawTapZones() {
  for (const zone of tapZones) {
    const t = zone.life / TAP_ZONE_LIFE;
    ctx.beginPath();
    ctx.arc(zone.x, zone.y, TAP_ZONE_RADIUS * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 220, 100, ${t * 0.25})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function loop() {
  updateTapZones();
  update();
  applyTapZones();
  draw();
  drawTapZones();
  requestAnimationFrame(loop);
}

loop();

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  addTapZone(e.clientX - rect.left, e.clientY - rect.top);
});
</script>
</body>
</html>
